<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta http-equiv="refresh" content="0; url=../?article=perfo-map" />
  <title>Redirecting...</title>
  <script>
    (function () {
      const target = new URL("../", window.location.href);
      target.searchParams.set("article", "perfo-map");
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <p>
    Redirecting to <a href="../?article=perfo-map">perfo-map article</a>.
  </p>
</body>
</html>
