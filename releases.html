<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Releases — sound art & composition" />
  <title>Petr Němec — Releases</title>

  <link rel="icon" type="image/png" href="assets/favicon_1.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body data-release-page="true">
  <div class="mask-layer" aria-hidden="true">
    <img id="maskImg" class="mask-img" src="assets/background.jpg" alt="" decoding="async" />
  </div>

  <canvas id="fx" aria-hidden="true"></canvas>

  <main class="wrap wrap-top">
    <header class="hero hero-compact">
      <div class="work-actions section-actions back-actions">
        <a class="back-link" href="index.html">Back to portfolio</a>
      </div>
      <h1>Releases</h1>
      <p class="tagline">Discography, collaborations, and documentation.</p>
    </header>

    <section class="section" id="releases-list">
      <h2>Releases</h2>

      <div class="release-mode-control" id="release-mode-control" data-mode="past">
        <div class="release-mode-labels" aria-hidden="true">
          <span class="release-mode-label" data-mode-label="past">Past</span>
          <span class="release-mode-label" data-mode-label="upcoming">Upcoming</span>
        </div>
        <input
          class="release-mode-slider"
          id="release-mode-slider"
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="0"
          aria-label="Toggle past and upcoming releases" />
      </div>

      <div class="release-mode-stage" id="release-mode-stage">
        <div class="release-list release-panel is-active" id="past-releases" data-release-mode="past"></div>
        <div class="release-list release-panel" id="upcoming-releases-full" data-release-mode="upcoming"></div>
      </div>
    </section>

    <footer class="footer">
      <p>© <span id="year"></span> Petr Němec</p>
    </footer>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
